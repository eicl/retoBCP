service: movements-api

build:
  esbuild:
    bundle: true
    minify: true
    target: node20
    platform: node
    external:
      - "@nestjs/websockets"
      - "@nestjs/microservices"
      - "class-validator"
      - "class-transformer"

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-2
  environment:
    TABLE_NAME: MovementsTable
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Scan
          Resource:
            - arn:aws:dynamodb:us-east-2:*:table/MovementsTable

functions:
  api:
    handler: dist/lambda.handler
    events:
      - httpApi:
          path: /movements
          method: POST

